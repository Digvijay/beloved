apiVersion: v2
name: beloved
description: A Helm chart for deploying Beloved Control Plane and Workers in Kubernetes
type: application
version: 0.1.0
appVersion: "1.0.0"
dependencies:
  - name: postgresql
    version: 15.5.4
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: rabbitmq
    version: 12.14.0
    repository: https://charts.bitnami.com/bitnami
    condition: rabbitmq.enabled
