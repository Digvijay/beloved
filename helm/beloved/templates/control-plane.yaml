apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "beloved.fullname" . }}-control-plane
  labels:
    {{- include "beloved.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "beloved.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: control-plane
  template:
    metadata:
      labels:
        {{- include "beloved.labels" . | nindent 8 }}
        app.kubernetes.io/component: control-plane
    spec:
      containers:
        - name: control-plane
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: ASPNETCORE_URLS
              value: "http://+:3000"
            - name: DatabaseProvider
              value: "PostgreSQL"
            - name: ConnectionStrings__PostgresDb
              value: "Host={{ .Release.Name }}-postgresql;Database={{ .Values.postgresql.auth.database }};Username=postgres;Password={{ .Values.postgresql.auth.postgresPassword }}"
            - name: RabbitMQ__Host
              value: "{{ .Release.Name }}-rabbitmq"
            - name: Stripe__SecretKey
              valueFrom:
                secretKeyRef:
                  name: {{ include "beloved.fullname" . }}-secrets
                  key: stripe-secret-key
            - name: Jwt__Secret
              valueFrom:
                secretKeyRef:
                  name: {{ include "beloved.fullname" . }}-secrets
                  key: jwt-secret
          resources:
            limits:
              cpu: 1000m
              memory: 512Mi
            requests:
              cpu: 250m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /healthz/live
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /healthz/ready
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "beloved.fullname" . }}-control-plane
  labels:
    {{- include "beloved.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 3000
      protocol: TCP
      name: http
  selector:
    {{- include "beloved.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: control-plane
