apiVersion: v1
kind: Secret
metadata:
  name: {{ include "beloved.fullname" . }}-secrets
  labels:
    {{- include "beloved.labels" . | nindent 4 }}
type: Opaque
data:
  stripe-secret-key: {{ .Values.secrets.stripeSecretKey | b64enc | quote }}
  jwt-secret: {{ .Values.secrets.jwtSecret | b64enc | quote }}
